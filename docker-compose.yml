services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: ${DATABASE_USERNAME:-skillswap}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-skillswap}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-skillswap}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DATABASE_URL: jdbc:postgresql://db:5432/skillswap
      DATABASE_USERNAME: ${DATABASE_USERNAME:-skillswap}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-skillswap}
      JWT_SECRET: ${JWT_SECRET:-SkillSwapSecretKeyForJWTTokenGeneration2024VeryLongSecretKeyThatIsAtLeast256BitsLong}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
