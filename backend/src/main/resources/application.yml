server:
  port: 8080

spring:
  application:
    name: skillswap-backend
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

jwt:
  # Default is a dev-only fallback. Production MUST override via JWT_SECRET env var
  # (the production docker-compose .env file is the canonical place).
  secret: ${JWT_SECRET:dev-only-jwt-secret-not-for-production-at-least-256-bits-of-padding-here-to-meet-hs256-key-length}
  expiration: 3600000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@skillswap.local}

# Mail settings are only honoured when MAIL_HOST is set. When unset the auto-configuration
# is skipped and OTP codes are logged to stdout (see EmailService).
spring.mail:
  host:     ${MAIL_HOST:}
  port:     ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.skillswap: INFO
