services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required in .env}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 6
    # No exposed port — only reachable on the internal network.

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DATABASE_URL: jdbc:postgresql://db:5432/skillswap
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME is required in .env}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in .env (generate with: openssl rand -base64 48)}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    # No exposed port — host nginx reaches it via the compose network.
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Host nginx (outside compose) forwards to 127.0.0.1:8081.
      - "127.0.0.1:8081:80"

volumes:
  pgdata:
