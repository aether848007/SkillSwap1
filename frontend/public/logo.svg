<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Green background -->
  <rect width="32" height="32" rx="7" fill="#2E7D32"/>
  <!-- Building (lower half) -->
  <rect x="5" y="18" width="22" height="11" rx="1.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Windows -->
  <rect x="7"  y="20" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.8)"/>
  <rect x="14" y="20" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.8)"/>
  <rect x="21" y="20" width="4" height="4" rx="0.8" fill="rgba(255,255,255,0.8)"/>
  <!-- Door -->
  <rect x="13" y="24" width="6" height="5" rx="0.8" fill="rgba(255,255,255,0.92)"/>
  <!-- Graduation cap board -->
  <path d="M16 5 L28 11 L16 17 L4 11 Z" fill="white"/>
  <!-- Cap dome -->
  <circle cx="16" cy="11" r="3" fill="#4CAF50"/>
  <!-- Tassel string -->
  <line x1="28" y1="11" x2="28" y2="17" stroke="#FFC107" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="28" cy="18" r="1.6" fill="#FFC107"/>
</svg>
